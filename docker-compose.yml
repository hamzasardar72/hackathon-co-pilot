version: '3.9'
services:
  api:
    build:
      context: ./backend
    container_name: claimwise-api
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=postgresql://postgres:postgres@db:5432/claimwise
    depends_on:
      - db

  db:
    image: postgres:16-alpine
    container_name: claimwise-db
    environment:
      POSTGRES_DB: claimwise
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data:
